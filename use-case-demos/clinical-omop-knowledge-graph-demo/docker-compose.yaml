services:
  unitycatalog:
    image: unitycatalog/unitycatalog:latest
    container_name: unitycatalog
    networks:
      demo_net:
    volumes:
      - ./delta:/delta
    ports:
      - "9000:8080"
      - "3000:3000"
  spark:
    image: apache/spark:3.5.6
    container_name: spark
    networks:
      demo_net:
    volumes:
      - ./spark-conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - ./delta:/delta
    environment:
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: password
    command: ["bash", "-lc", "tail -f /dev/null"]
  puppygraph:
    image: puppygraph/puppygraph:1.0-preview
    container_name: puppygraph
    networks:
      demo_net:
    environment:
      - PUPPYGRAPH_USERNAME=puppygraph
      - PUPPYGRAPH_PASSWORD=puppygraph123
    volumes:
      - ./delta:/delta
    ports:
      - "8081:8081"
      - "8182:8182"
      - "7687:7687"

networks:
  demo_net:
    name: mimic-omop-demo